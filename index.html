<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Precision Mobile Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --green: #00ff41;
            --red: #ff3131;
            --ui-card: #111111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* CENTERED MOBILE SCANNER BOX */
        #scanner-viewport {
            position: relative;
            width: 100%;
            max-width: 350px;
            height: 250px;
            background: #000;
            border-radius: 12px;
            border: 2px solid #333;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #reader { width: 100% !important; height: 100% !important; }

        /* RECTANGULAR MASK */
        #mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            -webkit-mask-image: linear-gradient(black, black), linear-gradient(black, black);
            mask-clip: content-box, border-box;
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
            padding: 85px 20px; /* This defines the clear box height */
        }

        /* THE GREEN BOX FRAME */
        #green-frame {
            position: absolute;
            top: 85px; bottom: 85px; left: 20px; right: 20px;
            border: 2px solid var(--green);
            z-index: 10;
            display: flex;
            align-items: center; /* Centers the red line vertically */
        }

        /* STATIC RED LINE (Scanning Trigger Point) */
        #static-red-line {
            width: 100%;
            height: 3px;
            background: var(--red);
            box-shadow: 0 0 10px var(--red);
            z-index: 11;
            /* No animation as per requirement */
        }

        .success-flash { background: var(--green) !important; box-shadow: 0 0 20px var(--green) !important; }

        /* BUTTONS */
        .controls { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 20px; }
        button { flex: 1; height: 50px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #start-btn { background: var(--green); color: black; }
        #stop-btn { background: var(--red); color: white; }
        #dl-btn { background: #1a73e8; color: white; }
        button:disabled { opacity: 0.2; }

        /* TABLE */
        .table-view { width: 100%; max-width: 350px; background: var(--ui-card); border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #222; color: var(--green); padding: 10px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        .img-cell { width: 80px; height: 40px; object-fit: cover; border: 1px solid #444; background: white; }
    </style>
</head>
<body>

    <h3 style="margin-bottom: 15px;">PRECISION SCANNER <span style="font-size: 10px; color: #777;">V2.0</span></h3>

    <div id="scanner-viewport">
        <div id="reader"></div>
        <div id="mask"></div>
        <div id="green-frame">
            <div id="static-red-line"></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">START</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="dl-btn">EXCEL</button>
    </div>

    <div class="table-view">
        <table>
            <thead>
                <tr>
                    <th>SNo</th>
                    <th>Value</th>
                    <th>Capture</th>
                    <th>CODE128</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <canvas id="crop-cvs" style="display:none;"></canvas>
    <canvas id="barcode-cvs" style="display:none;"></canvas>

    <script>
        let scanner;
        let dataLog = [];
        let locked = false;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const logBody = document.getElementById('log-body');
        const redLine = document.getElementById('static-red-line');

        async function onScan(text, result) {
            if (locked) return;
            if (dataLog.find(i => i.val === text)) return;

            locked = true;
            redLine.classList.add('success-flash');

            // 1. CAPTURE & CROP (Match Green Box Area)
            const video = document.querySelector('video');
            const cropCvs = document.getElementById('crop-cvs');
            const ctx = cropCvs.getContext('2d');
            
            // Fixed dimensions for barcode capture
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            const cropW = vW * 0.85;
            const cropH = vH * 0.25; // Narrow crop for barcodes
            
            cropCvs.width = cropW;
            cropCvs.height = cropH;
            ctx.drawImage(video, (vW-cropW)/2, (vH-cropH)/2, cropW, cropH, 0, 0, cropW, cropH);
            const photo = cropCvs.toDataURL('image/jpeg', 0.8);

            // 2. GENERATE CODE128 (width: 4, height: 60)
            const barCvs = document.getElementById('barcode-cvs');
            try {
                JsBarcode(barCvs, text, {
                    format: "CODE128",
                    width: 4, 
                    height: 60,
                    displayValue: true,
                    fontSize: 16
                });
            } catch(e) {}
            const barImg = barCvs.toDataURL('image/png');

            // 3. LOG & UI
            const entry = { sno: dataLog.length + 1, val: text, photo: photo, bar: barImg };
            dataLog.push(entry);

            const row = `<tr>
                <td>${entry.sno}</td>
                <td style="word-break:break-all"><b>${entry.val}</b></td>
                <td><img src="${photo}" class="img-cell" style="background:transparent"></td>
                <td><img src="${barImg}" class="img-cell"></td>
            </tr>`;
            logBody.insertAdjacentHTML('afterbegin', row);

            // 4. RESET (Short cooldown for speed)
            setTimeout(() => {
                redLine.classList.remove('success-flash');
                locked = false;
            }, 800);
        }

        async function run() {
            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 30, 
                // Narrow QRBox forces scanning only on the red line area
                qrbox: { width: 300, height: 80 }, 
                aspectRatio: 1.0 
            };
            await scanner.start({ facingMode: "environment" }, config, onScan);
            startBtn.disabled = true; stopBtn.disabled = false;
        }

        async function quit() {
            if (scanner) { await scanner.stop(); startBtn.disabled = false; stopBtn.disabled = true; }
        }

        async function exportXL() {
            if (dataLog.length === 0) return;
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('Data');
            
            ws.columns = [
                { header: 'S.No', key: 'sno', width: 8 },
                { header: 'Barcode Value', key: 'val', width: 25 },
                { header: 'Capture', key: 'photo', width: 30 },
                { header: 'CODE128 Gen', key: 'bar', width: 30 }
            ];

            for (const item of dataLog) {
                const row = ws.addRow({ sno: item.sno, val: item.val });
                row.height = 75;

                const pId = wb.addImage({ base64: item.photo, extension: 'jpeg' });
                ws.addImage(pId, { tl: { col: 2, row: row.number - 1 }, ext: { width: 180, height: 70 } });

                const bId = wb.addImage({ base64: item.bar, extension: 'png' });
                ws.addImage(bId, { tl: { col: 3, row: row.number - 1 }, ext: { width: 180, height: 70 } });
            }

            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), "Precision_Scan_Report.xlsx");
        }

        startBtn.onclick = run;
        stopBtn.onclick = quit;
        document.getElementById('dl-btn').onclick = exportXL;
    </script>
</body>
</html>
