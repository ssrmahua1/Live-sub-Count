<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Green Line Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

#container {
    position: relative;
    display: inline-block;
}

video {
    width: 360px;
    border-radius: 10px;
}

#frame {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 280px;
    height: 140px;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff00;
    border-radius: 10px;
    box-sizing: border-box;
}

#scan-line {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 280px;
    height: 2px;
    background: #00ff00;
    transform: translate(-50%, -50%);
    animation: scanMove 2s infinite;
}

@keyframes scanMove {
    0% { transform: translate(-50%, -70px); }
    50% { transform: translate(-50%, 70px); }
    100% { transform: translate(-50%, -70px); }
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    border: 1px solid black;
    padding: 6px 12px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>⚡ Green Line Barcode Scanner</h2>

<div id="container">
    <video id="video"></video>
    <div id="frame"></div>
    <div id="scan-line"></div>
</div>

<h3>Scanned Data</h3>

<table id="table">
<tr>
<th>S.No</th>
<th>Barcode</th>
<th>Date</th>
<th>Time</th>
</tr>
</table>

<button onclick="downloadExcel()">Download Excel</button>

<script>
let codeReader = new ZXing.BrowserMultiFormatReader();
let serial = 1;
let scannedSet = new Set();
let scannedArray = [];
let cooldown = false;

codeReader.listVideoInputDevices().then(videoInputDevices => {
    let selectedDeviceId = videoInputDevices[0].deviceId;

    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
        if (result && !cooldown) {

            let text = result.text;

            if (scannedSet.has(text)) return;

            scannedSet.add(text);
            cooldown = true;

            let now = new Date();
            let date = now.toLocaleDateString();
            let time = now.toLocaleTimeString();

            scannedArray.push({
                "S.No": serial,
                "Barcode": text,
                "Date": date,
                "Time": time
            });

            let table = document.getElementById("table");
            let row = table.insertRow();
            row.insertCell(0).innerHTML = serial;
            row.insertCell(1).innerHTML = text;
            row.insertCell(2).innerHTML = date;
            row.insertCell(3).innerHTML = time;

            serial++;

            setTimeout(() => cooldown = false, 10);
        }
    });
});

function downloadExcel() {
    let ws = XLSX.utils.json_to_sheet(scannedArray);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Barcodes");
    XLSX.writeFile(wb, "Green_Line_Scanned_Barcodes.xlsx");
}
</script>

</body>
</html>
