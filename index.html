<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Professional Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2{margin:10px 0;}

button{
    padding:8px 15px;
    margin:6px;
    font-size:14px;
}

#scanner-container{
    position:relative;
    width:320px;
    height:180px;
    margin:auto;
    border:3px solid #00ff00;
    border-radius:12px;
    overflow:hidden;
}

/* Scanner Area */
#reader{
    width:100%;
    height:100%;
}

/* Remove default border */
#reader > div{
    border:none !important;
}

/* Scan line */
.scan-line{
    position:absolute;
    width:100%;
    height:3px;
    background:red;
    animation:move 2s infinite linear;
    z-index:10;
}

@keyframes move{
    0%{top:10%;}
    50%{top:85%;}
    100%{top:10%;}
}

#result{
    margin-top:8px;
    color:yellow;
    font-size:15px;
    word-break:break-all;
}

/* Table */
table{
    width:100%;
    max-width:320px;
    margin:15px auto;
    border-collapse:collapse;
    background:white;
    color:black;
}

th,td{
    border:1px solid black;
    padding:6px;
    font-size:13px;
}
</style>
</head>

<body>

<h2>📷 Professional Barcode Scanner</h2>

<button onclick="startScan()">Start</button>
<button onclick="stopScan()">Stop</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="scanner-container">
    <div id="reader"></div>
    <div class="scan-line" id="scanLine"></div>
</div>

<div id="result">Scanned: -</div>

<h3>Scanned List</h3>
<table id="scanTable">
<tr>
<th>S.No</th>
<th>Barcode</th>
</tr>
</table>

<script>

let html5Qr;
let scannedSet=new Set();
let scannedData=[];
let serial=1;
let cooldown=false;
let scanning=false;

function startScan(){

    if(scanning) return;
    scanning=true;

    html5Qr=new Html5Qrcode("reader");

    html5Qr.start(
        { facingMode:"environment" },
        {
            fps:20,
            qrbox:{ width:280, height:120 }
        },
        (decodedText)=>{

            if(scannedSet.has(decodedText) || cooldown) return;

            scannedSet.add(decodedText);
            cooldown=true;

            // Show result
            document.getElementById("result").innerText=
            "Scanned: "+decodedText;

            // Flash green line
            let line=document.getElementById("scanLine");
            line.style.background="lime";
            setTimeout(()=>{
                line.style.background="red";
                cooldown=false;
            },600);

            // Add to website list
            let table=document.getElementById("scanTable");
            let row=table.insertRow(-1);
            row.insertCell(0).innerHTML=serial;
            row.insertCell(1).innerHTML=decodedText;

            scannedData.push({
                "S.No":serial,
                "Barcode":decodedText
            });

            serial++;
        }
    );
}

function stopScan(){
    if(html5Qr){
        html5Qr.stop().then(()=>{
            scanning=false;
        });
    }
}

function downloadExcel(){
    let ws=XLSX.utils.json_to_sheet(scannedData);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Barcodes");
    XLSX.writeFile(wb,"Scanned_Barcodes.xlsx");
}

</script>

</body>
</html>
