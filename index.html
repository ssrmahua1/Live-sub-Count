<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Barcode Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #121212;
            --card-bg: #1e1e1e;
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Scanner Container */
        #scanner-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* Overlay & Masking */
        #scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* Creates the dark semi-transparent mask around the clear box */
            background: rgba(0, 0, 0, 0.7);
            mask-image: linear-gradient(#000, #000), linear-gradient(#000, #000);
            mask-clip: content-box, border-box;
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
            padding: 20%; /* Controls the size of the clear box */
        }

        /* The Green Frame */
        #scan-region-highlight {
            position: absolute;
            top: 20%;
            left: 20%;
            right: 20%;
            bottom: 20%;
            border: 3px solid var(--accent-green);
            z-index: 11;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
        }

        /* Moving Scan Line */
        #scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: var(--accent-red);
            top: 0;
            left: 0;
            box-shadow: 0 0 8px var(--accent-red);
            animation: moveLine 2.5s infinite linear;
            z-index: 12;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        @keyframes moveLine {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .line-success {
            background-color: var(--accent-green) !important;
            box-shadow: 0 0 12px var(--accent-green) !important;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #start-btn { background-color: var(--accent-green); color: white; }
        #stop-btn { background-color: var(--accent-red); color: white; }
        #download-btn { background-color: #2196f3; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Data Display */
        .status-panel {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            text-align: center;
        }

        #last-result {
            font-size: 1.2rem;
            color: var(--accent-green);
            font-weight: bold;
            word-break: break-all;
        }

        /* Table Styles */
        .table-container {
            width: 100%;
            max-width: 500px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th { background-color: #2a2a2a; color: var(--accent-green); }
    </style>
</head>
<body>

    <h2 style="margin-top: 0;">PRO Barcode Scanner</h2>

    <div id="scanner-wrapper">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
        <div id="scan-region-highlight">
            <div id="scan-line"></div>
        </div>
    </div>

    <div class="status-panel">
        <div>Last Scanned:</div>
        <div id="last-result">None</div>
    </div>

    <div class="controls">
        <button id="start-btn">Start Scan</button>
        <button id="stop-btn" disabled>Stop Scan</button>
        <button id="download-btn">Download Excel</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Barcode Value</th>
                </tr>
            </thead>
            <tbody id="scanned-list">
                </tbody>
        </table>
    </div>

    <script>
        let html5QrCode;
        let scannedData = [];
        let isCooldown = false;

        const lastResultDisplay = document.getElementById('last-result');
        const scannedList = document.getElementById('scanned-list');
        const scanLine = document.getElementById('scan-line');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const downloadBtn = document.getElementById('download-btn');

        function onScanSuccess(decodedText, decodedResult) {
            if (isCooldown) return;
            
            // Block duplicates
            if (scannedData.includes(decodedText)) {
                return;
            }

            // Success Visual Feedback
            isCooldown = true;
            scanLine.classList.add('line-success');
            lastResultDisplay.innerText = decodedText;

            // Update Data
            scannedData.push(decodedText);
            updateTable();

            // Cooldown logic (0.7 seconds)
            setTimeout(() => {
                scanLine.classList.remove('line-success');
                isCooldown = false;
            }, 700);
        }

        function updateTable() {
            scannedList.innerHTML = "";
            scannedData.forEach((code, index) => {
                const row = `<tr>
                    <td>${index + 1}</td>
                    <td>${code}</td>
                </tr>`;
                scannedList.innerHTML += row;
            });
        }

        async function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, 
                qrbox: (viewWidth, viewHeight) => {
                    // Logic to ensure scanning only happens inside the green box
                    const size = Math.min(viewWidth, viewHeight) * 0.6;
                    return { width: size, height: size };
                },
                aspectRatio: 1.0
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess
                );
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } catch (err) {
                alert("Camera Error: " + err);
            }
        }

        async function stopScanner() {
            if (html5QrCode) {
                await html5QrCode.stop();
                html5QrCode.clear();
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function downloadExcel() {
            if (scannedData.length === 0) {
                alert("No data to export!");
                return;
            }

            const dataForExcel = scannedData.map((code, index) => ({
                "S.No": index + 1,
                "Barcode Value": code
            }));

            const worksheet = XLSX.utils.json_to_sheet(dataForExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Barcodes");
            XLSX.writeFile(workbook, "Scanned_Barcodes.xlsx");
        }

        startBtn.addEventListener('click', startScanner);
        stopBtn.addEventListener('click', stopScanner);
        downloadBtn.addEventListener('click', downloadExcel);
    </script>
</body>
</html>
