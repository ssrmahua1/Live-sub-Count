<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Phone Optimized Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --blue: #007AFF;
            --green: #32D74B;
            --red: #FF453A;
            /* iPhone notch aur home bar handling */
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            /* Screen size fix */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. Camera Section - Fixed Height */
        #scanner-container {
            position: relative;
            width: 100%;
            height: 40%; /* Camera occupies 40% of screen */
            background: #000;
            margin-top: var(--safe-top);
            border-bottom: 2px solid #333;
            touch-action: none;
        }

        #reader { width: 100% !important; height: 100% !important; }

        /* Adjustable Box */
        #resizable-box {
            position: absolute;
            border: 2px solid var(--blue);
            z-index: 11;
            top: 25%; left: 15%; width: 70%; height: 50%;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6);
            display: flex; align-items: center; justify-content: center;
        }

        #red-line { width: 100%; height: 2px; background: var(--red); box-shadow: 0 0 10px var(--red); }

        .corner {
            position: absolute; width: 35px; height: 35px; background: var(--blue);
            border-radius: 50%; border: 3px solid white; z-index: 15;
        }
        #tl { top: -17px; left: -17px; }
        #br { bottom: -17px; right: -17px; }

        /* 2. Controls Section */
        .controls {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: #1c1c1e;
        }

        button {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            color: #fff;
        }
        #start-btn { background: var(--green); color: #000; }
        #stop-btn { background: var(--red); }
        #xl-btn { background: var(--blue); }

        /* 3. List Section - Scrollable */
        .list-area {
            flex: 1;
            overflow-y: auto;
            background: #000;
            padding-bottom: var(--safe-bottom); /* Home bar gap */
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #121212; padding: 12px; color: #888; text-align: left; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #222; vertical-align: middle; text-align: center;}
        
        .thumb { width: 70px; height: 40px; object-fit: cover; border-radius: 4px; background: #fff; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="resizable-box">
            <div id="red-line"></div>
            <div class="corner" id="tl"></div>
            <div class="corner" id="br"></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">START</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="xl-btn">EXCEL</button>
    </div>

    <div class="list-area">
        <table>
            <thead>
                <tr>
                    <th>SNo</th>
                    <th>Value</th>
                    <th>Capture</th>
                    <th>Barcode</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <canvas id="crop-cvs" style="display:none;"></canvas>
    <canvas id="bar-cvs" style="display:none;"></canvas>

    <script>
        let scanner;
        let scans = [];
        let isLocked = false;
        const box = document.getElementById('resizable-box');

        // Draggable Logic (Multi-touch safe)
        let currentCorner = null;
        const corners = document.querySelectorAll('.corner');
        
        corners.forEach(c => {
            c.addEventListener('touchstart', (e) => { 
                currentCorner = e.target.id; 
                e.preventDefault(); 
            }, {passive: false});
        });

        document.addEventListener('touchmove', (e) => {
            if (!currentCorner) return;
            const touch = e.touches[0];
            const container = document.getElementById('scanner-container').getBoundingClientRect();
            
            const x = touch.clientX - container.left;
            const y = touch.clientY - container.top;

            if (currentCorner === 'br') {
                box.style.width = Math.max(50, x - box.offsetLeft) + 'px';
                box.style.height = Math.max(30, y - box.offsetTop) + 'px';
            } else if (currentCorner === 'tl') {
                const newW = box.offsetLeft + box.offsetWidth - x;
                const newH = box.offsetTop + box.offsetHeight - y;
                if(newW > 50 && newH > 30) {
                    box.style.left = x + 'px';
                    box.style.top = y + 'px';
                    box.style.width = newW + 'px';
                    box.style.height = newH + 'px';
                }
            }
        }, {passive: false});

        document.addEventListener('touchend', () => currentCorner = null);

        async function onScan(text) {
            if (isLocked || scans.some(s => s.val === text)) return;
            isLocked = true;

            const video = document.querySelector('video');
            const canvas = document.getElementById('crop-cvs');
            const ctx = canvas.getContext('2d');

            const vW = video.videoWidth; const vH = video.videoHeight;
            const container = document.getElementById('scanner-container');
            const scaleX = vW / container.offsetWidth;
            const scaleY = vH / container.offsetHeight;

            const rect = box.getBoundingClientRect();
            const contRect = container.getBoundingClientRect();

            const cX = (rect.left - contRect.left) * scaleX;
            const cY = (rect.top - contRect.top) * scaleY;
            const cW = rect.width * scaleX;
            const cH = rect.height * scaleY;

            canvas.width = cW; canvas.height = cH;
            ctx.drawImage(video, cX, cY, cW, cH, 0, 0, cW, cH);
            
            const photo = canvas.toDataURL('image/jpeg', 0.7);
            const barCvs = document.getElementById('bar-cvs');
            JsBarcode(barCvs, text, { format: "CODE128", width: 2, height: 40, displayValue: true });
            const barImg = barCvs.toDataURL('image/png');

            const entry = { sno: scans.length + 1, val: text, photo: photo, bar: barImg };
            scans.push(entry);

            const row = `<tr>
                <td>${entry.sno}</td>
                <td style="word-break:break-all"><b>${entry.val}</b></td>
                <td><img src="${photo}" class="thumb"></td>
                <td><img src="${barImg}" class="thumb"></td>
            </tr>`;
            document.getElementById('log-body').insertAdjacentHTML('afterbegin', row);

            // iPhone Haptic Feedback (Vibration)
            if (navigator.vibrate) navigator.vibrate(50);

            setTimeout(() => { isLocked = false; }, 1500);
        }

        async function start() {
            scanner = new Html5Qrcode("reader");
            await scanner.start({ facingMode: "environment" }, { 
                fps: 20, 
                qrbox: (w, h) => ({ width: w*0.8, height: h*0.4 }) 
            }, onScan);
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        }

        async function stop() { 
            await scanner.stop(); 
            document.getElementById('start-btn').disabled = false; 
            document.getElementById('stop-btn').disabled = true; 
        }

        async function exportXL() {
            const wb = new ExcelJS.Workbook(); const ws = wb.addWorksheet('Scans');
            ws.columns = [{header:'SNo',key:'sno',width:5},{header:'Value',key:'val',width:20},{header:'Photo',key:'p',width:20},{header:'Bar',key:'b',width:20}];
            for (const s of scans) {
                const row = ws.addRow({sno:s.sno, val:s.val}); row.height = 60;
                ws.addImage(wb.addImage({base64:s.photo, extension:'jpeg'}), {tl:{col:2,row:row.number-1}, ext:{width:120,height:50}});
                ws.addImage(wb.addImage({base64:s.bar, extension:'png'}), {tl:{col:3,row:row.number-1}, ext:{width:120,height:50}});
            }
            saveAs(new Blob([await wb.xlsx.writeBuffer()]), "Scans_Fixed.xlsx");
        }

        document.getElementById('start-btn').onclick = start;
        document.getElementById('stop-btn').onclick = stop;
        document.getElementById('xl-btn').onclick = exportXL;
    </script>
</body>
</html>
