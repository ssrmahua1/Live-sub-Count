<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcode Scanner with Image Excel</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }
video { width:360px; border-radius:10px; border:3px solid #00ff00; }
canvas { display:none; }
button { padding:10px 20px; margin:10px; font-weight:bold; }
</style>
</head>

<body>

<h2>📷 Barcode Scanner → Excel (With Image)</h2>

<video id="video"></video>
<canvas id="barcodeCanvas"></canvas>

<br>
<button onclick="downloadExcel()">Download Excel</button>

<script>

let codeReader = new ZXing.BrowserMultiFormatReader();
let scannedData = [];
let scannedSet = new Set();
let cooldown = false;

codeReader.listVideoInputDevices().then(videoInputDevices => {
    let selectedDeviceId = videoInputDevices[0].deviceId;

    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
        if (result && !cooldown) {

            let text = result.text;

            if (scannedSet.has(text)) return;

            scannedSet.add(text);
            cooldown = true;

            // Generate barcode image
            let canvas = document.getElementById("barcodeCanvas");
            JsBarcode(canvas, text, {
                format: "CODE128",
                width: 2,
                height: 60,
                displayValue: false
            });

            let imageBase64 = canvas.toDataURL("image/png");

            scannedData.push({
                value: text,
                image: imageBase64
            });

            setTimeout(() => cooldown = false, 1200);
        }
    });
});

async function downloadExcel() {

    const workbook = new ExcelJS.Workbook();
    const sheet = workbook.addWorksheet("Barcodes");

    sheet.columns = [
        { header: "S.No", key: "sno", width: 10 },
        { header: "Barcode Value", key: "value", width: 25 },
        { header: "Barcode Image", key: "image", width: 30 }
    ];

    for (let i = 0; i < scannedData.length; i++) {

        let rowNumber = i + 2;

        sheet.addRow({
            sno: i + 1,
            value: scannedData[i].value
        });

        const imageId = workbook.addImage({
            base64: scannedData[i].image,
            extension: 'png',
        });

        sheet.addImage(imageId, {
            tl: { col: 2, row: rowNumber - 1 },
            ext: { width: 200, height: 70 }
        });

        sheet.getRow(rowNumber).height = 60;
    }

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: "application/octet-stream" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Barcode_With_Image.xlsx";
    link.click();
}

</script>

</body>
</html>
