<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision Barcode Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg: #0f0f0f;
            --green: #00ff41;
            --red: #ff3e3e;
            --panel: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. Scanner Window & Custom Masking */
        #scanner-container {
            position: relative;
            width: 320px;
            height: 320px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        #reader { width: 100%; height: 100%; }

        /* Dark overlay with a transparent center hole */
        #mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            -webkit-mask-image: radial-gradient(circle, transparent 120px, black 121px);
            mask-image: radial-gradient(circle, transparent 120px, black 121px);
        }

        /* The Green Scanning Box */
        #scan-box {
            position: absolute;
            top: 50%; left: 50%;
            width: 240px; height: 120px; /* Barcode-shaped rectangle */
            transform: translate(-50%, -50%);
            border: 2px solid var(--green);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        /* Moving Scan Line */
        #scan-line {
            position: absolute; width: 100%; height: 2px;
            background-color: var(--red);
            top: 0; left: 0;
            box-shadow: 0 0 10px var(--red);
            animation: scanAnim 2s infinite linear;
            z-index: 11;
        }

        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .line-success { 
            background-color: var(--green) !important; 
            box-shadow: 0 0 15px var(--green) !important; 
        }

        /* UI Elements */
        .controls { display: flex; gap: 10px; width: 320px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #start-btn { background: var(--green); color: black; }
        #stop-btn { background: var(--red); color: white; }
        #download-btn { background: #2196f3; color: white; }

        .table-wrap { width: 100%; max-width: 500px; border-radius: 8px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; background: var(--panel); font-size: 13px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        .thumb-img { width: 80px; height: 40px; object-fit: cover; border: 1px solid var(--green); }
    </style>
</head>
<body>

    <h3 style="margin: 10px 0; letter-spacing: 1px;">PRECISION SCANNER</h3>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="mask"></div>
        <div id="scan-box">
            <div id="scan-line"></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">START</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="download-btn">EXCEL</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Value</th>
                    <th>Format</th>
                    <th>Image</th>
                </tr>
            </thead>
            <tbody id="scan-tbody"></tbody>
        </table>
    </div>

    <canvas id="crop-canvas" style="display:none;"></canvas>

    <script>
        let html5QrCode;
        let scannedItems = [];
        let isLock = false;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const scanLine = document.getElementById('scan-line');
        const tbody = document.getElementById('scan-tbody');
        const cropCanvas = document.getElementById('crop-canvas');

        function onScanSuccess(decodedText, decodedResult) {
            if (isLock) return;
            
            // Duplicate Check
            if (scannedItems.some(i => i.value === decodedText)) return;

            isLock = true;
            
            // Visual Feedback
            scanLine.classList.add('line-success');

            // 1. Capture & Crop the image inside the Green Box
            const video = document.querySelector('video');
            const ctx = cropCanvas.getContext('2d');
            
            // Define crop area (center of video)
            const cropW = video.videoWidth * 0.6;
            const cropH = video.videoHeight * 0.3;
            const startX = (video.videoWidth - cropW) / 2;
            const startY = (video.videoHeight - cropH) / 2;

            cropCanvas.width = cropW;
            cropCanvas.height = cropH;
            ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
            
            const croppedImage = cropCanvas.toDataURL('image/jpeg', 0.7);

            // 2. Save Data
            const newItem = {
                sno: scannedItems.length + 1,
                value: decodedText,
                format: decodedResult.result.format.formatName,
                image: croppedImage
            };
            scannedItems.push(newItem);

            // 3. Update UI
            const row = `<tr>
                <td>${newItem.sno}</td>
                <td style="color:var(--green)">${newItem.value}</td>
                <td>${newItem.format}</td>
                <td><img src="${croppedImage}" class="thumb-img"></td>
            </tr>`;
            tbody.insertAdjacentHTML('afterbegin', row);

            // 4. Cooldown (0.8s)
            setTimeout(() => {
                scanLine.classList.remove('line-success');
                isLock = false;
            }, 800);
        }

        async function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 240, height: 120 }, // Match the green box size
                aspectRatio: 1.0 
            };

            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } catch (err) { alert(err); }
        }

        async function stopScanner() {
            if (html5QrCode) {
                await html5QrCode.stop();
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        function downloadExcel() {
            if (scannedItems.length === 0) return;

            // Excel columns: S.No, Barcode Value, Format, Scanned Image (Link/Base64)
            const data = scannedItems.map(item => ({
                "S.No": item.sno,
                "Barcode Value": item.value,
                "Format": item.format,
                "Scanned Image": "Image Saved Below" // Excel cell text
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "ScannedData");
            
            // Note: Standard XLSX files don't support embedding images easily via simple JSON-to-Sheet.
            // This exports the text data.
            XLSX.writeFile(wb, "Scanned_Barcodes.xlsx");
        }

        startBtn.onclick = startScanner;
        stopBtn.onclick = stopScanner;
        document.getElementById('download-btn').onclick = downloadExcel;
    </script>
</body>
</html>
