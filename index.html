<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FAS Code Scanner</title>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #ffffff;
            color: #000;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* 1. Camera Viewport */
        #scanner-container {
            position: relative;
            width: 100%;
            height: 35%;
            background: #000;
            flex-shrink: 0;
            overflow: hidden;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Green Box UI - Exactly what we crop */
        #green-frame {
            position: absolute;
            top: 50%; left: 50%;
            width: 280px; height: 100px;
            transform: translate(-50%, -50%);
            border: 3px solid var(--success);
            border-radius: 8px;
            z-index: 10;
            pointer-events: none;
        }

        #scan-line {
            position: absolute;
            width: 100%; height: 2px;
            background: var(--danger);
            box-shadow: 0 0 8px var(--danger);
            animation: move 2s infinite linear;
        }

        @keyframes move { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        /* 2. Controls - Simple & Flat */
        .controls {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #ffffff;
            border-bottom: 1px solid #eeeeee;
            flex-shrink: 0;
        }

        button {
            flex: 1; height: 46px; border: none; border-radius: 8px;
            font-weight: 700; cursor: pointer; color: white;
            font-size: 14px;
        }
        #btn-start { background: var(--success); }
        #btn-stop { background: var(--danger); }
        #btn-excel { background: var(--primary); }
        button:disabled { opacity: 0.3; }

        /* 3. Table - No Shadows, Pure White */
        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #ffffff;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            box-shadow: none; /* Shadow removed */
        }

        th { 
            position: sticky; top: 0; 
            background: #f9f9f9; 
            padding: 12px; font-size: 11px; 
            color: #999; text-transform: uppercase;
            border-bottom: 1px solid #eee;
            z-index: 20;
        }

        td { 
            padding: 10px; 
            border-bottom: 1px solid #f0f0f0; 
            text-align: center; font-size: 14px;
            background: #fff; /* Ensuring pure white bg */
        }
        
        .crop-img { 
            width: 90px; height: 45px; 
            object-fit: cover; 
            border-radius: 4px; 
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div id="scanner-container">
        <video id="video"></video>
        <div id="green-frame">
            <div id="scan-line"></div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-start">START</button>
        <button id="btn-stop" disabled>STOP</button>
        <button id="btn-excel">EXCEL</button>
    </div>

    <div class="list-container">
        <table>
            <thead>
                <tr>
                    <th>SNo</th>
                    <th>Value</th>
                    <th>Box Crop</th>
                    <th>Barcode</th>
                </tr>
            </thead>
            <tbody id="scan-body"></tbody>
        </table>
    </div>

    <canvas id="crop-canvas" style="display:none;"></canvas>
    <canvas id="bar-canvas" style="display:none;"></canvas>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const scanBody = document.getElementById('scan-body');
        const startBtn = document.getElementById('btn-start');
        const stopBtn = document.getElementById('btn-stop');
        const excelBtn = document.getElementById('btn-excel');

        let dataStore = [];
        let scannedSet = new Set();
        let isBusy = false;

        async function start() {
            startBtn.disabled = true;
            stopBtn.disabled = false;

            codeReader.decodeFromConstraints({
                video: { facingMode: "environment" }
            }, "video", (result, err) => {
                if (result && !isBusy) {
                    const text = result.text;
                    if (scannedSet.has(text)) return;
                    
                    isBusy = true;
                    scannedSet.add(text);
                    if (navigator.vibrate) navigator.vibrate(50);

                    // --- 1. PRECISE CROP LOGIC ---
                    const video = document.getElementById('video');
                    const canvas = document.getElementById('crop-canvas');
                    const ctx = canvas.getContext('2d');

                    // Mapping UI frame to Video resolution
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;
                    const containerW = video.offsetWidth;
                    const containerH = video.offsetHeight;

                    const scale = vW / containerW;

                    // UI box size is 280x100
                    const cropW = 280 * scale;
                    const cropH = 100 * scale;
                    const startX = (vW - cropW) / 2;
                    const startY = (vH - cropH) / 2;

                    canvas.width = cropW;
                    canvas.height = cropH;
                    ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
                    const cropData = canvas.toDataURL("image/jpeg", 0.8);

                    // --- 2. BARCODE GEN ---
                    const barCanvas = document.getElementById('bar-canvas');
                    JsBarcode(barCanvas, text, { format: "CODE128", width: 2, height: 50 });
                    const barImgData = barCanvas.toDataURL("image/png");

                    // --- 3. UI UPDATE ---
                    const entry = { sno: dataStore.length + 1, val: text, crop: cropData, bar: barImgData };
                    dataStore.push(entry);

                    const row = `<tr>
                        <td>${entry.sno}</td>
                        <td style="font-weight:bold">${entry.val}</td>
                        <td><img src="${cropData}" class="crop-img"></td>
                        <td><img src="${barImgData}" class="crop-img"></td>
                    </tr>`;
                    scanBody.insertAdjacentHTML('afterbegin', row);

                    setTimeout(() => { isBusy = false; }, 1200);
                }
            });
        }

        function stop() {
            codeReader.reset();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        async function downloadExcel() {
            if (dataStore.length === 0) return;
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet("Scans");

            ws.columns = [
                { header: "SNo", key: "sno", width: 8 },
                { header: "Barcode Value", key: "val", width: 25 },
                { header: "Photo", width: 25 },
                { header: "Barcode Gen", width: 25 }
            ];

            for (const [i, item] of dataStore.entries()) {
                const row = ws.addRow({ sno: item.sno, val: item.val });
                row.height = 70;
                
                const cropId = wb.addImage({ base64: item.crop, extension: 'jpeg' });
                const barId = wb.addImage({ base64: item.bar, extension: 'png' });

                ws.addImage(cropId, { tl: { col: 2, row: i + 1 }, ext: { width: 140, height: 60 } });
                ws.addImage(barId, { tl: { col: 3, row: row.number - 1 }, ext: { width: 140, height: 60 } });
            }

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "Scan_Report.xlsx");
        }

        startBtn.onclick = start;
        stopBtn.onclick = stop;
        excelBtn.onclick = downloadExcel;
    </script>
</body>
</html>
