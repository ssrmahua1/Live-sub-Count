<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Professional Barcode System</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --gray: #f8fafc;
            --text: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #ffffff;
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* 1. TOP HEADER */
        header {
            padding: 15px 20px;
            background: #fff;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
            font-weight: 800;
            letter-spacing: 1px;
            font-size: 1.2rem;
            color: var(--primary);
            flex-shrink: 0;
        }

        /* 2. CAMERA BOX (Full Width, Simple) */
        #scanner-section {
            width: 100%;
            height: 35vh;
            background: #000;
            position: relative;
            flex-shrink: 0;
        }

        #reader { width: 100% !important; height: 100% !important; }

        /* Scanning Line Animation */
        .scan-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--danger);
            box-shadow: 0 0 15px var(--danger);
            z-index: 10;
            animation: moveLine 2s infinite ease-in-out;
        }

        @keyframes moveLine {
            0% { top: 20%; }
            50% { top: 80%; }
            100% { top: 20%; }
        }

        /* 3. CONTROLS (Floating Style) */
        .controls {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #fff;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }

        button {
            flex: 1;
            height: 48px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        #start-btn { background: var(--success); color: white; }
        #stop-btn { background: var(--danger); color: white; }
        #xl-btn { background: var(--primary); color: white; }
        button:disabled { opacity: 0.3; filter: grayscale(1); }
        button:active { transform: scale(0.95); }

        /* 4. DATA TABLE (White Theme) */
        .data-section {
            flex-grow: 1;
            overflow-y: auto;
            background: var(--gray);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead th {
            position: sticky;
            top: 0;
            background: #f1f5f9;
            padding: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
            z-index: 20;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
            font-size: 0.85rem;
            vertical-align: middle;
        }

        .img-preview {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
            background: #fff;
        }

        .barcode-val {
            font-family: monospace;
            font-weight: bold;
            color: var(--primary);
            background: #eff6ff;
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>BARCODE MANAGER</header>

    <div id="scanner-section">
        <div id="reader"></div>
        <div class="scan-line" id="line"></div>
    </div>

    <div class="controls">
        <button id="start-btn">▶ START</button>
        <button id="stop-btn" disabled>■ STOP</button>
        <button id="xl-btn">⬇ EXCEL</button>
    </div>

    <div class="data-section">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Value</th>
                    <th>Photo</th>
                    <th>Gen</th>
                </tr>
            </thead>
            <tbody id="log-body">
                </tbody>
        </table>
    </div>

    <canvas id="photo-cvs" style="display:none;"></canvas>
    <canvas id="bar-cvs" style="display:none;"></canvas>

    <script>
        let scanner;
        let dataRecords = [];
        let isProcessing = false;

        const logBody = document.getElementById('log-body');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const xlBtn = document.getElementById('xl-btn');

        async function handleScan(decodedText) {
            // 1. DUPLICATE CHECK: Prevent same code twice
            if (isProcessing || dataRecords.some(r => r.val === decodedText)) return;

            isProcessing = true;
            
            // Provide Haptic/Visual Feedback
            if (navigator.vibrate) navigator.vibrate(50);
            document.getElementById('line').style.background = "var(--success)";

            try {
                // 2. CAPTURE PHOTO (Full Resolution)
                const video = document.querySelector('video');
                const pCanvas = document.getElementById('photo-cvs');
                const pCtx = pCanvas.getContext('2d');
                pCanvas.width = video.videoWidth;
                pCanvas.height = video.videoHeight;
                pCtx.drawImage(video, 0, 0);
                const photoData = pCanvas.toDataURL('image/jpeg', 0.6);

                // 3. GENERATE BARCODE
                const bCanvas = document.getElementById('bar-cvs');
                JsBarcode(bCanvas, decodedText, {
                    format: "CODE128",
                    width: 2,
                    height: 50,
                    displayValue: true
                });
                const barData = bCanvas.toDataURL('image/png');

                // 4. SAVE RECORD
                const entry = {
                    id: dataRecords.length + 1,
                    val: decodedText,
                    photo: photoData,
                    bar: barData
                };
                dataRecords.push(entry);

                // 5. UPDATE UI (Add to top of table)
                const row = `
                    <tr>
                        <td>${entry.id}</td>
                        <td><span class="barcode-val">${entry.val}</span></td>
                        <td><img src="${photoData}" class="img-preview"></td>
                        <td><img src="${barData}" class="img-preview"></td>
                    </tr>
                `;
                logBody.insertAdjacentHTML('afterbegin', row);

            } catch (err) {
                console.error("Error processing scan:", err);
            }

            // Cooldown to reset
            setTimeout(() => {
                isProcessing = false;
                document.getElementById('line').style.background = "var(--danger)";
            }, 1500);
        }

        async function startScanner() {
            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 25, 
                qrbox: (w, h) => ({ width: w * 0.7, height: h * 0.5 }),
                aspectRatio: 1.7777 // 16:9 aspect ratio for phones
            };

            await scanner.start({ facingMode: "environment" }, config, handleScan);
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
        }

        async function stopScanner() {
            if (scanner) {
                await scanner.stop();
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        async function downloadExcel() {
            if (dataRecords.length === 0) return alert("No data to export!");
            
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('Scan Data');

            ws.columns = [
                { header: 'ID', key: 'id', width: 8 },
                { header: 'Barcode Value', key: 'val', width: 30 },
                { header: 'Photo', key: 'photo', width: 25 },
                { header: 'Generated Barcode', key: 'bar', width: 25 }
            ];

            for (const item of dataRecords) {
                const row = ws.addRow({ id: item.id, val: item.val });
                row.height = 70;

                const pId = wb.addImage({ base64: item.photo, extension: 'jpeg' });
                const bId = wb.addImage({ base64: item.bar, extension: 'png' });

                ws.addImage(pId, { tl: { col: 2, row: row.number - 1 }, ext: { width: 150, height: 60 } });
                ws.addImage(bId, { tl: { col: 3, row: row.number - 1 }, ext: { width: 150, height: 60 } });
            }

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "Scan_Report.xlsx");
        }

        startBtn.onclick = startScanner;
        stopBtn.onclick = stopScanner;
        xlBtn.onclick = downloadExcel;
    </script>
</body>
</html>
