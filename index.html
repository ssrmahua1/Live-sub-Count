<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Speed Barcode Scanner Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg: #0a0a0a;
            --green: #00ff41;
            --red: #ff3e3e;
            --ui-panel: #161616;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 1. RECTANGULAR SCANNER STYLE */
        #scanner-wrapper {
            position: relative;
            width: 340px;
            height: 200px; /* Rectangular aspect ratio for barcodes */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #333;
            margin-bottom: 20px;
        }

        #reader { width: 100%; height: 100%; }

        /* Rectangular Mask: Dark outside, clear inside green box */
        #mask-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
            background: rgba(0, 0, 0, 0.8);
            /* This creates a rectangular hole */
            mask-image: linear-gradient(black, black), linear-gradient(black, black);
            mask-clip: content-box, border-box;
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
            padding: 20px 40px; /* Defines the size of the clear scanning area */
        }

        #scan-box {
            position: absolute;
            top: 20px; left: 40px; right: 40px; bottom: 20px;
            border: 2px solid var(--green);
            z-index: 10;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        #scan-line {
            position: absolute; width: 100%; height: 2px;
            background-color: var(--red);
            top: 0; animation: scanAnim 1.5s infinite linear;
            z-index: 11;
        }

        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        .scan-success { 
            background-color: var(--green) !important; 
            box-shadow: 0 0 20px var(--green) !important; 
        }

        /* UI CONTROLS */
        .btn-group { display: flex; gap: 10px; width: 340px; margin-bottom: 20px; }
        button { 
            flex: 1; padding: 14px; border: none; border-radius: 6px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        #start-btn { background: var(--green); color: black; }
        #stop-btn { background: var(--red); color: white; }
        #download-btn { background: #007bff; color: white; }
        button:disabled { opacity: 0.3; }

        /* DATA TABLE */
        .table-container { width: 100%; max-width: 500px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--ui-panel); font-size: 13px; }
        th { background: #222; color: var(--green); padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #333; }
        .row-img { width: 80px; height: 40px; object-fit: cover; border: 1px solid #444; border-radius: 4px; }
    </style>
</head>
<body>

    <h2 style="margin: 10px 0; color: var(--green);">BARCODE SCANNER PRO</h2>

    <div id="scanner-wrapper">
        <div id="reader"></div>
        <div id="mask-overlay"></div>
        <div id="scan-box">
            <div id="scan-line"></div>
        </div>
    </div>

    <div class="btn-group">
        <button id="start-btn">Start</button>
        <button id="stop-btn" disabled>Stop</button>
        <button id="download-btn">Download Excel</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Value</th>
                    <th>Format</th>
                    <th>Image</th>
                </tr>
            </thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>

    <canvas id="crop-canvas" style="display:none;"></canvas>

    <script>
        let html5QrCode;
        let scannedData = [];
        let isScanningLocked = false;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const scanLine = document.getElementById('scan-line');
        const resultBody = document.getElementById('result-body');
        const cropCanvas = document.getElementById('crop-canvas');

        async function onScanSuccess(decodedText, decodedResult) {
            if (isScanningLocked) return;
            
            // Block duplicates in the list
            if (scannedData.some(item => item.value === decodedText)) return;

            isScanningLocked = true;
            scanLine.classList.add('scan-success');

            // 1. CAPTURE & CROP (Rectangular)
            const video = document.querySelector('video');
            const ctx = cropCanvas.getContext('2d');
            
            // Calculate Crop (Focusing on the center area where the green box is)
            const cWidth = video.videoWidth * 0.6;
            const cHeight = video.videoHeight * 0.3;
            const startX = (video.videoWidth - cWidth) / 2;
            const startY = (video.videoHeight - cHeight) / 2;

            cropCanvas.width = cWidth;
            cropCanvas.height = cHeight;
            ctx.drawImage(video, startX, startY, cWidth, cHeight, 0, 0, cWidth, cHeight);
            const capturedImg = cropCanvas.toDataURL('image/jpeg', 0.8);

            // 2. STORE DATA
            const scanObject = {
                sno: scannedData.length + 1,
                value: decodedText,
                format: decodedResult.result.format.formatName || "CODE128",
                image: capturedImg
            };
            scannedData.push(scanObject);

            // 3. UI UPDATE
            const row = `<tr>
                <td>${scanObject.sno}</td>
                <td style="color:var(--green); font-weight:bold;">${scanObject.value}</td>
                <td>${scanObject.format}</td>
                <td><img src="${capturedImg}" class="row-img"></td>
            </tr>`;
            resultBody.insertAdjacentHTML('afterbegin', row);

            // 4. COOLDOWN (Fast: 0.6 seconds)
            setTimeout(() => {
                scanLine.classList.remove('scan-success');
                isScanningLocked = false;
            }, 600);
        }

        async function startScanner() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 25, 
                qrbox: { width: 260, height: 120 }, // Optimized for CODE128
                aspectRatio: 1.77 
            };

            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } catch (err) { alert("Camera Permission Required"); }
        }

        async function stopScanner() {
            if (html5QrCode) {
                await html5QrCode.stop();
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        // NEW: Excel Export with Embedded Images
        async function downloadExcel() {
            if (scannedData.length === 0) {
                alert("Scan some items first!");
                return;
            }

            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('Scanned Barcodes');

            // Define Columns
            worksheet.columns = [
                { header: 'S.No', key: 'sno', width: 10 },
                { header: 'Barcode Value', key: 'value', width: 25 },
                { header: 'Format', key: 'format', width: 20 },
                { header: 'Captured Image', key: 'image', width: 30 }
            ];

            for (const item of scannedData) {
                const row = worksheet.addRow({
                    sno: item.sno,
                    value: item.value,
                    format: item.format
                });
                
                // Adjust row height for image
                row.height = 60;

                // Add Base64 image to workbook
                const imageId = workbook.addImage({
                    base64: item.image,
                    extension: 'jpeg',
                });

                // Insert image into the cell (column 4)
                worksheet.addImage(imageId, {
                    tl: { col: 3, row: row.number - 1 },
                    ext: { width: 150, height: 50 },
                    editAs: 'oneCell'
                });
            }

            // Styling headers
            worksheet.getRow(1).font = { bold: true };

            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "Scanned_Barcodes.xlsx");
        }

        startBtn.onclick = startScanner;
        stopBtn.onclick = stopScanner;
        document.getElementById('download-btn').onclick = downloadExcel;
    </script>
</body>
</html>
