<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FAS Scanner for JCI</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --green: #00ff41;
            --red: #ff3131;
            --card: #121212;
            --safe-area-inset-top: env(safe-area-inset-top);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            padding: calc(var(--safe-area-inset-top) + 10px) 10px 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            width: 100vw;
        }

        /* MOBILE OPTIMIZED SCANNER WINDOW */
        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 240px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        #reader { width: 100%; height: 100%; }

        /* RECTANGULAR DARK MASK (Camera only in box) */
        #mask-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5; pointer-events: none;
            background: rgba(0, 0, 0, 0.85);
            -webkit-mask-image: linear-gradient(black, black), linear-gradient(black, black);
            mask-clip: content-box, border-box;
            mask-composite: exclude;
            -webkit-mask-composite: destination-out;
            padding: 50px 30px; /* Adjusts the clear viewport size */
        }

        /* GREEN BOX & RED LINE */
        #scan-box {
            position: absolute;
            top: 50px; left: 30px; right: 30px; bottom: 50px;
            border: 2px solid var(--green);
            z-index: 10;
            pointer-events: none;
        }

        #scan-line {
            position: absolute; width: 100%; height: 2px;
            background-color: var(--red);
            top: 0; box-shadow: 0 0 12px var(--red);
            animation: scanAnim 1.8s infinite linear;
            z-index: 11;
        }

        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }
        .success-active { background-color: var(--green) !important; box-shadow: 0 0 20px var(--green) !important; }

        /* MOBILE BUTTONS */
        .btn-row { display: flex; gap: 8px; width: 100%; max-width: 360px; margin-bottom: 15px; }
        button { 
            flex: 1; height: 50px; border: none; border-radius: 10px; 
            font-size: 14px; font-weight: 800; color: white; cursor: pointer;
        }
        #start-btn { background: var(--green); color: black; }
        #stop-btn { background: var(--red); }
        #download-btn { background: #1a73e8; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        button:disabled { opacity: 0.2; transform: none; }

        /* SCROLLED TABLE */
        .list-container {
            width: 100%;
            max-width: 360px;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1f1f1f; color: var(--green); padding: 12px 8px; text-align: left; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 10px 8px; border-bottom: 1px solid #222; vertical-align: middle; }
        
        .thumb-img { 
            width: 70px; height: 40px; 
            object-fit: cover; 
            border: 1px solid #444; 
            border-radius: 4px;
            background: #fff;
        }
    </style>
</head>
<body>

    <h2 style="margin: 5px 0 15px 0; font-size: 20px; letter-spacing: -0.5px;">SCANNER<span style="color:var(--green)">PRO</span></h2>

    <div id="scanner-container">
        <div id="reader"></div>
        <div id="mask-overlay"></div>
        <div id="scan-box">
            <div id="scan-line"></div>
        </div>
    </div>

    <div class="btn-row">
        <button id="start-btn">START</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="download-btn">EXCEL</button>
    </div>

    <div class="list-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Data</th>
                    <th>Photo</th>
                    <th>Barcode</th>
                </tr>
            </thead>
            <tbody id="scan-list"></tbody>
        </table>
    </div>

    <canvas id="crop-canvas" style="display:none;"></canvas>
    <canvas id="barcode-gen" style="display:none;"></canvas>

    <script>
        let scanner;
        let scans = [];
        let isBusy = false;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const listBody = document.getElementById('scan-list');
        const scanLine = document.getElementById('scan-line');

        async function handleScan(text, result) {
            if (isBusy) return;
            if (scans.find(s => s.value === text)) return; // Prevent duplicates

            isBusy = true;
            scanLine.classList.add('success-active');

            // 1. Precise Crop Capture
            const video = document.querySelector('video');
            const cropCanvas = document.getElementById('crop-canvas');
            const ctx = cropCanvas.getContext('2d');
            
            // Logic: Capture the middle horizontal strip of the camera
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const cropW = vWidth * 0.8;
            const cropH = vHeight * 0.4;
            cropCanvas.width = cropW;
            cropCanvas.height = cropH;
            ctx.drawImage(video, (vWidth-cropW)/2, (vHeight-cropH)/2, cropW, cropH, 0, 0, cropW, cropH);
            const photoData = cropCanvas.toDataURL('image/jpeg', 0.7);

            // 2. JsBarcode Generation
            const genCanvas = document.getElementById('barcode-gen');
            try {
                JsBarcode(genCanvas, text, {
                    format: "CODE128", width: 2, height: 60, displayValue: true, margin: 10
                });
            } catch(e) {}
            const barcodeImg = genCanvas.toDataURL('image/png');

            // 3. Save & Display
            const newScan = {
                sno: scans.length + 1,
                value: text,
                format: result.result.format.formatName || "CODE128",
                photo: photoData,
                barcode: barcodeImg
            };
            scans.push(newScan);

            const row = `<tr>
                <td>${newScan.sno}</td>
                <td><b>${newScan.value}</b><br><small>${newScan.format}</small></td>
                <td><img src="${photoData}" class="thumb-img" style="background:transparent"></td>
                <td><img src="${barcodeImg}" class="thumb-img"></td>
            </tr>`;
            listBody.insertAdjacentHTML('afterbegin', row);

            // 4. Reset after 700ms (High speed)
            setTimeout(() => {
                scanLine.classList.remove('success-active');
                isBusy = false;
            }, 700);
        }

        async function start() {
            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 30, 
                qrbox: { width: 280, height: 120 }, 
                aspectRatio: 1.0,
                videoConstraints: { facingMode: "environment", focusMode: "continuous" }
            };
            await scanner.start({ facingMode: "environment" }, config, handleScan);
            startBtn.disabled = true; stopBtn.disabled = false;
        }

        async function stop() {
            if (scanner) { await scanner.stop(); startBtn.disabled = false; stopBtn.disabled = true; }
        }

        async function exportExcel() {
            if (scans.length === 0) return;
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('Scans');
            
            ws.columns = [
                { header: 'S.No', key: 'sno', width: 10 },
                { header: 'Value', key: 'value', width: 25 },
                { header: 'Format', key: 'format', width: 15 },
                { header: 'Photo', key: 'photo', width: 25 },
                { header: 'Generated Barcode', key: 'barcode', width: 25 }
            ];

            for (const s of scans) {
                const row = ws.addRow({ sno: s.sno, value: s.value, format: s.format });
                row.height = 80;

                const pId = wb.addImage({ base64: s.photo, extension: 'jpeg' });
                ws.addImage(pId, { tl: { col: 3, row: row.number - 1 }, ext: { width: 160, height: 80 } });

                const bId = wb.addImage({ base64: s.barcode, extension: 'png' });
                ws.addImage(bId, { tl: { col: 4, row: row.number - 1 }, ext: { width: 160, height: 80 } });
            }

            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), "Barcode_Report.xlsx");
        }

        startBtn.onclick = start;
        stopBtn.onclick = stop;
        document.getElementById('download-btn').onclick = exportExcel;
    </script>
</body>
</html>
