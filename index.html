<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Complete Barcode Scanner with Camera Select</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

#container {
    position: relative;
    display: inline-block;
    margin-top: 20px;
}

video {
    width: 400px;
    border-radius: 10px;
}

#frame {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 150px;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff00;
    border-radius: 12px;
}

#scan-line {
    position: absolute;
    width: 300px;
    height: 2px;
    background: #00ff00;
    left: 50%;
    top: 50%;
    animation: scanMove 2s infinite linear;
}

@keyframes scanMove {
    0% { transform: translate(-50%, -70px); }
    50% { transform: translate(-50%, 70px); }
    100% { transform: translate(-50%, -70px); }
}

button, select {
    padding: 10px 15px;
    margin: 10px;
    font-size: 16px;
    font-weight: bold;
}

canvas {
    display: none;
}
</style>
</head>

<body>

<h2>⚡ Barcode Scanner (Camera Select)</h2>

<select id="cameraSelect"></select>
<br>
<button onclick="startScan()">Start Scan</button>
<button onclick="stopScan()">Stop Scan</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="container">
    <video id="video"></video>
    <div id="frame"></div>
    <div id="scan-line"></div>
</div>

<canvas id="barcodeCanvas"></canvas>

<script>

let codeReader = new ZXing.BrowserMultiFormatReader();
let scannedData = [];
let scannedSet = new Set();
let cooldown = false;
let scanning = false;
let selectedDeviceId = null;

// Load cameras
async function loadCameras() {
    const devices = await codeReader.listVideoInputDevices();
    const select = document.getElementById("cameraSelect");

    devices.forEach(device => {
        const option = document.createElement("option");
        option.value = device.deviceId;
        option.text = device.label || `Camera ${select.length + 1}`;
        select.appendChild(option);
    });

    if (devices.length > 0) {
        selectedDeviceId = devices[0].deviceId;
    }

    select.onchange = function() {
        selectedDeviceId = this.value;
    };
}

loadCameras();

async function startScan() {

    if (scanning) return;
    if (!selectedDeviceId) return alert("No camera found");

    scanning = true;

    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
        if (result && !cooldown) {

            let text = result.text;

            if (scannedSet.has(text)) return;

            scannedSet.add(text);
            cooldown = true;

            let canvas = document.getElementById("barcodeCanvas");

            JsBarcode(canvas, text, {
                format: "CODE128",
                width: 2,
                height: 80,
                displayValue: true
            });

            let imageBase64 = canvas.toDataURL("image/png");

            scannedData.push({
                value: text,
                image: imageBase64
            });

            setTimeout(() => cooldown = false, 800);
        }
    });
}

function stopScan() {
    codeReader.reset();
    scanning = false;
}

async function downloadExcel() {

    const workbook = new ExcelJS.Workbook();
    const sheet = workbook.addWorksheet("Barcodes");

    sheet.columns = [
        { header: "S.No", width: 10 },
        { header: "Barcode Value", width: 25 },
        { header: "Barcode Image", width: 35 }
    ];

    for (let i = 0; i < scannedData.length; i++) {

        const row = sheet.addRow([
            i + 1,
            scannedData[i].value,
            ""
        ]);

        row.height = 70;

        const imageId = workbook.addImage({
            base64: scannedData[i].image,
            extension: 'png'
        });

        sheet.addImage(imageId, {
            tl: { col: 2, row: i + 1 },
            ext: { width: 220, height: 70 }
        });
    }

    const buffer = await workbook.xlsx.writeBuffer();

    const blob = new Blob([buffer], {
        type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Barcode_With_Image.xlsx";
    link.click();
}

</script>

</body>
</html>
