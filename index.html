<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>60FPS Precision Scanner</title>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --primary: #007AFF; --success: #34C759; --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

        /* Camera View */
        #scanner-container { position: relative; width: 100%; height: 35vh; background: #000; flex-shrink: 0; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Target Frame */
        #green-frame {
            position: absolute; top: 50%; left: 50%; width: 280px; height: 100px;
            transform: translate(-50%, -50%); border: 3px solid var(--success);
            border-radius: 12px; z-index: 10; pointer-events: none;
        }
        #scan-line {
            position: absolute; width: 100%; height: 2px; background: var(--danger);
            box-shadow: 0 0 10px var(--danger); animation: move 1.5s infinite linear;
        }
        @keyframes move { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        /* Controls */
        .controls { display: flex; gap: 10px; padding: 12px; border-bottom: 1px solid #eee; background: #fff; }
        button { flex: 1; height: 48px; border: none; border-radius: 10px; font-weight: 700; color: #fff; font-size: 14px; }
        #btn-start { background: var(--success); }
        #btn-stop { background: var(--danger); }
        #btn-excel { background: var(--primary); }
        button:disabled { opacity: 0.3; }

        /* Clean Table - No Shadows */
        .list-area { flex: 1; overflow-y: auto; background: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #f8f9fa; padding: 12px; font-size: 11px; color: #888; border-bottom: 1px solid #eee; text-align: center; }
        td { padding: 10px; border-bottom: 1px solid #f1f1f1; text-align: center; font-size: 14px; vertical-align: middle; }
        .img-box { width: 90px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid #eee; background: #fff; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <video id="video"></video>
        <div id="green-frame"><div id="scan-line"></div></div>
    </div>

    <div class="controls">
        <button id="btn-start">START SCAN</button>
        <button id="btn-stop" disabled>STOP</button>
        <button id="btn-excel">SAVE EXCEL</button>
    </div>

    <div class="list-area">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Value</th>
                    <th>Box Photo</th>
                    <th>Barcode</th>
                </tr>
            </thead>
            <tbody id="scan-body"></tbody>
        </table>
    </div>

    <canvas id="crop-cvs" style="display:none;"></canvas>
    <canvas id="bar-cvs" style="display:none;"></canvas>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const scanBody = document.getElementById('scan-body');
        let dataStore = [];
        let scannedSet = new Set();
        let isBusy = false;

        async function start() {
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-stop').disabled = false;

            // 60 FPS Constraints
            const constraints = {
                video: { 
                    facingMode: "environment",
                    frameRate: { ideal: 60, min: 30 }
                }
            };

            codeReader.decodeFromConstraints(constraints, "video", (result, err) => {
                if (result && !isBusy) {
                    const text = result.text;
                    if (scannedSet.has(text)) return;
                    
                    isBusy = true;
                    scannedSet.add(text);
                    if (navigator.vibrate) navigator.vibrate(40);

                    // 1. CROP BOX IMAGE
                    const video = document.getElementById('video');
                    const canvas = document.getElementById('crop-cvs');
                    const ctx = canvas.getContext('2d');
                    const vW = video.videoWidth; const vH = video.videoHeight;
                    const scale = vW / video.offsetWidth;
                    
                    const cropW = 280 * scale; const cropH = 100 * scale;
                    const startX = (vW - cropW) / 2; const startY = (vH - cropH) / 2;

                    canvas.width = cropW; canvas.height = cropH;
                    ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
                    const cropData = canvas.toDataURL("image/jpeg", 0.8);

                    // 2. BARCODE GEN
                    const barCanvas = document.getElementById('bar-cvs');
                    JsBarcode(barCanvas, text, { format: "CODE128", width: 2, height: 50 });
                    const barImg = barCanvas.toDataURL("image/png");

                    // 3. STORE & UI
                    const entry = { sno: dataStore.length + 1, val: text, crop: cropData, bar: barImg };
                    dataStore.push(entry);

                    const row = `<tr>
                        <td>${entry.sno}</td>
                        <td style="font-weight:bold">${entry.val}</td>
                        <td><img src="${cropData}" class="img-box"></td>
                        <td><img src="${barImg}" class="img-box"></td>
                    </tr>`;
                    scanBody.insertAdjacentHTML('afterbegin', row);

                    setTimeout(() => { isBusy = false; }, 800); // Fast reset for 60fps feel
                }
            });
        }

        async function downloadExcel() {
            if (!dataStore.length) return;
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet("Daily Scans");

            ws.columns = [
                { header: "No", key: "sno", width: 8 },
                { header: "Barcode Value", key: "val", width: 25 },
                { header: "Original Capture", width: 30 },
                { header: "Generated Label", width: 30 }
            ];

            dataStore.forEach((item, i) => {
                const row = ws.addRow({ sno: item.sno, val: item.val });
                row.height = 80; // Set row height for images
                
                const img1 = wb.addImage({ base64: item.crop, extension: 'jpeg' });
                const img2 = wb.addImage({ base64: item.bar, extension: 'png' });

                ws.addImage(img1, { tl: { col: 2, row: i + 1 }, ext: { width: 180, height: 80 } });
                ws.addImage(img2, { tl: { col: 3, row: i + 1 }, ext: { width: 180, height: 80 } });
            });

            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), "Scan_60FPS_Report.xlsx");
        }

        document.getElementById('btn-start').onclick = start;
        document.getElementById('btn-stop').onclick = () => {
            codeReader.reset();
            document.getElementById('btn-start').disabled = false;
            document.getElementById('btn-stop').disabled = true;
        };
        document.getElementById('btn-excel').onclick = downloadExcel;
    </script>
</body>
</html>
