<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZXing Pro Scanner</title>

    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --safe-top: env(safe-area-inset-top, 0px);
        }

        body {
            font-family: -apple-system, sans-serif;
            background: #F2F2F7;
            color: #000;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* 1. Camera Section */
        #scanner-container {
            position: relative;
            width: 100%;
            height: 40%;
            background: #000;
            flex-shrink: 0;
            margin-top: var(--safe-top);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Professional Overlay */
        #frame {
            position: absolute;
            top: 50%; left: 50%;
            width: 70%; height: 40%;
            transform: translate(-50%, -50%);
            border: 2px solid var(--success);
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);
            border-radius: 8px;
            pointer-events: none;
        }

        #scan-line {
            position: absolute;
            width: 100%; height: 2px;
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
            animation: move 2.5s infinite ease-in-out;
        }

        @keyframes move { 
            0%, 100% { top: 10%; } 
            50% { top: 90%; } 
        }

        /* 2. Control Bar */
        .controls {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: #fff;
            border-bottom: 1px solid #D1D1D6;
            flex-shrink: 0;
        }

        button {
            flex: 1; height: 44px; border: none; border-radius: 10px;
            font-weight: 600; font-size: 14px; cursor: pointer; color: white;
            transition: opacity 0.2s;
        }
        #btn-start { background: var(--success); }
        #btn-stop { background: var(--danger); }
        #btn-excel { background: var(--primary); }
        button:disabled { opacity: 0.3; }

        /* 3. List Table */
        .list-container {
            flex-grow: 1;
            overflow-y: auto;
            background: #fff;
        }

        table { width: 100%; border-collapse: collapse; }
        th { 
            position: sticky; top: 0; background: #F2F2F7; 
            padding: 10px; font-size: 12px; color: #8E8E93; 
            text-align: center; border-bottom: 1px solid #D1D1D6;
        }
        td { padding: 12px 8px; border-bottom: 1px solid #E5E5EA; text-align: center; font-size: 14px; }
        
        .barcode-img { width: 80px; height: 40px; border-radius: 4px; border: 1px solid #eee; }
        .val-badge { background: #E5E5EA; padding: 4px 8px; border-radius: 6px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <video id="video"></video>
        <div id="frame">
            <div id="scan-line"></div>
        </div>
    </div>

    <div class="controls">
        <button id="btn-start">START</button>
        <button id="btn-stop" disabled>STOP</button>
        <button id="btn-excel">EXCEL</button>
    </div>

    <div class="list-container">
        <table>
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Barcode Value</th>
                    <th>Image</th>
                </tr>
            </thead>
            <tbody id="scan-body"></tbody>
        </table>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        const scanBody = document.getElementById('scan-body');
        const startBtn = document.getElementById('btn-start');
        const stopBtn = document.getElementById('btn-stop');
        const excelBtn = document.getElementById('btn-excel');

        let scannedData = [];
        let scannedSet = new Set();
        let isCooldown = false;

        async function start() {
            startBtn.disabled = true;
            stopBtn.disabled = false;

            codeReader.decodeFromConstraints({
                video: { facingMode: "environment" }
            }, "video", (result, err) => {
                if (result && !isCooldown) {
                    const text = result.text;
                    
                    if (scannedSet.has(text)) return;
                    
                    // Logic Start
                    isCooldown = true;
                    scannedSet.add(text);
                    if (navigator.vibrate) navigator.vibrate(50);

                    // Generate Barcode Image
                    const canvas = document.getElementById('hidden-canvas');
                    JsBarcode(canvas, text, { format: "CODE128", width: 2, height: 50 });
                    const imgData = canvas.toDataURL("image/png");

                    // Save Data
                    const entry = { sno: scannedData.length + 1, val: text, img: imgData };
                    scannedData.push(entry);

                    // Update UI
                    const row = `<tr>
                        <td>${entry.sno}</td>
                        <td><span class="val-badge">${entry.val}</span></td>
                        <td><img src="${imgData}" class="barcode-img"></td>
                    </tr>`;
                    scanBody.insertAdjacentHTML('afterbegin', row);

                    // Cooldown Reset
                    setTimeout(() => { isCooldown = false; }, 1000);
                }
            });
        }

        function stop() {
            codeReader.reset();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        async function downloadExcel() {
            if (scannedData.length === 0) return alert("List is empty!");
            
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet("Barcodes");

            ws.columns = [
                { header: "S.No", key: "sno", width: 10 },
                { header: "Barcode Value", key: "val", width: 30 },
                { header: "Image", key: "img", width: 30 }
            ];

            for (const [i, item] of scannedData.entries()) {
                const row = ws.addRow({ sno: item.sno, val: item.val });
                row.height = 60;
                
                const imageId = wb.addImage({ base64: item.img, extension: 'png' });
                ws.addImage(imageId, {
                    tl: { col: 2, row: i + 1 },
                    ext: { width: 180, height: 60 }
                });
            }

            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "Barcode_Report.xlsx");
        }

        startBtn.onclick = start;
        stopBtn.onclick = stop;
        excelBtn.onclick = downloadExcel;
    </script>
</body>
</html>
