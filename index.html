<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Professional Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
}

#container {
    position: relative;
    display: inline-block;
    margin-top: 20px;
}

video {
    width: 380px;
    border-radius: 10px;
}

#frame {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 300px;
    height: 150px;
    transform: translate(-50%, -50%);
    border: 3px solid #00ff00;
    border-radius: 12px;
}

#scan-line {
    position: absolute;
    width: 300px;
    height: 2px;
    background: #00ff00;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    animation: scanMove 2s infinite linear;
}

@keyframes scanMove {
    0% { transform: translate(-50%, -75px); }
    50% { transform: translate(-50%, 75px); }
    100% { transform: translate(-50%, -75px); }
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-weight: bold;
    font-size: 16px;
}

table {
    margin: 20px auto;
    border-collapse: collapse;
    background: white;
    color: black;
}

th, td {
    border: 1px solid black;
    padding: 6px 12px;
}
</style>
</head>

<body>

<h2>⚡ Professional Fast Barcode Scanner</h2>

<button onclick="startScan()">Start Scan</button>
<button onclick="stopScan()">Stop Scan</button>

<div id="container">
    <video id="video"></video>
    <div id="frame"></div>
    <div id="scan-line"></div>
</div>

<h3>Scanned List</h3>

<table id="table">
<tr>
<th>S.No</th>
<th>Barcode</th>
<th>Time</th>
</tr>
</table>

<button onclick="downloadExcel()">Download Excel</button>

<script>
let codeReader = new ZXing.BrowserMultiFormatReader();
let selectedDeviceId;
let serial = 1;
let scannedSet = new Set();
let scannedArray = [];
let cooldown = false;

async function startScan() {

    const devices = await codeReader.listVideoInputDevices();
    selectedDeviceId = devices[0].deviceId;

    codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
        if (result && !cooldown) {

            let text = result.text;

            if (scannedSet.has(text)) return;

            scannedSet.add(text);
            cooldown = true;

            let now = new Date().toLocaleTimeString();

            scannedArray.push({
                sno: serial,
                barcode: text,
                time: now
            });

            let table = document.getElementById("table");
            let row = table.insertRow(-1);
            row.insertCell(0).innerHTML = serial;
            row.insertCell(1).innerHTML = text;
            row.insertCell(2).innerHTML = now;

            serial++;

            setTimeout(() => cooldown = false, 1000);
        }
    });
}

function stopScan() {
    codeReader.reset();
}

function downloadExcel() {
    let ws = XLSX.utils.json_to_sheet(scannedArray);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Barcodes");
    XLSX.writeFile(wb, "Scanned_Barcodes.xlsx");
}
</script>

</body>
</html>
