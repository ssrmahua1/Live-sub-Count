<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Barcode Scanner</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

h2{margin:10px 0;}

button{
    padding:8px 15px;
    margin:6px;
    font-size:14px;
}

#container{
    position:relative;
    width:100%;
    max-width:420px;
    height:260px;
    margin:auto;
    overflow:hidden;
    border-radius:12px;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Dark outside */
#overlay{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

#overlay:before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    width:85%;
    height:120px;
    transform:translate(-50%,-50%);
    box-shadow:0 0 0 2000px rgba(0,0,0,0.7);
    border-radius:12px;
}

/* Green frame */
#frame{
    position:absolute;
    top:50%;
    left:50%;
    width:85%;
    height:120px;
    transform:translate(-50%,-50%);
    border:3px solid #00ff00;
    border-radius:12px;
    overflow:hidden;
}

/* Scan line */
#scan-line{
    position:absolute;
    width:100%;
    height:3px;
    background:red;
    animation:scanMove 2s infinite linear;
}

@keyframes scanMove{
    0%{top:10%;}
    50%{top:85%;}
    100%{top:10%;}
}

#result{
    margin-top:8px;
    color:yellow;
    font-size:16px;
    word-break:break-all;
}

/* Table */
table{
    width:100%;
    max-width:420px;
    margin:15px auto;
    border-collapse:collapse;
    background:white;
    color:black;
}

th,td{
    border:1px solid black;
    padding:6px;
    font-size:13px;
}
</style>
</head>

<body>

<h2>📷 Barcode Scanner</h2>

<button onclick="startScan()">Start</button>
<button onclick="stopScan()">Stop</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="container">
    <video id="video"></video>
    <div id="overlay"></div>
    <div id="frame">
        <div id="scan-line"></div>
    </div>
</div>

<div id="result">Scanned: -</div>

<h3>Scanned List</h3>
<table id="scanTable">
<tr>
<th>S.No</th>
<th>Barcode</th>
</tr>
</table>

<script>

let codeReader = new ZXing.BrowserMultiFormatReader();
let scanning=false;
let scannedSet=new Set();
let scannedData=[];
let serial=1;
let cooldown=false;

async function startScan(){

    if(scanning) return;
    scanning=true;

    const constraints={
        video:{ facingMode:{ ideal:"environment"}}
    };

    codeReader.decodeFromConstraints(
        constraints,
        "video",
        (result,err)=>{

            if(result && !cooldown){

                let text=result.text;

                if(scannedSet.has(text)) return;

                scannedSet.add(text);
                cooldown=true;

                // Show scanned
                document.getElementById("result").innerText="Scanned: "+text;

                // Flash green
                let line=document.getElementById("scan-line");
                line.style.background="lime";
                setTimeout(()=>{
                    line.style.background="red";
                    cooldown=false;
                },600);

                // Add to list
                let table=document.getElementById("scanTable");
                let row=table.insertRow(-1);
                row.insertCell(0).innerHTML=serial;
                row.insertCell(1).innerHTML=text;

                scannedData.push({
                    "S.No":serial,
                    "Barcode":text
                });

                serial++;
            }
        }
    );
}

function stopScan(){
    codeReader.reset();
    scanning=false;
}

function downloadExcel(){

    let ws=XLSX.utils.json_to_sheet(scannedData);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Barcodes");
    XLSX.writeFile(wb,"Scanned_Barcodes.xlsx");
}

</script>

</body>
</html>
