<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Stable Barcode Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; text-align:center; }
#reader { width:350px; margin:auto; }
button, select { padding:8px 15px; margin:5px; }
table { margin:20px auto; border-collapse:collapse; }
th,td { border:1px solid black; padding:6px 10px; }
</style>
</head>
<body>

<h2>Stable Barcode Scanner</h2>

<select id="cameraSelect"></select>
<button onclick="startScan()">Start</button>
<button onclick="stopScan()">Stop</button>
<button onclick="downloadExcel()">Download Excel</button>

<div id="reader"></div>

<table id="table">
<tr>
<th>S.No</th>
<th>Barcode</th>
</tr>
</table>

<script>

let html5Qr;
let serial = 1;
let scannedSet = new Set();
let scannedData = [];

async function loadCameras() {
    const devices = await Html5Qrcode.getCameras();
    const select = document.getElementById("cameraSelect");

    devices.forEach(device => {
        const option = document.createElement("option");
        option.value = device.id;
        option.text = device.label;
        select.appendChild(option);
    });
}

loadCameras();

function startScan() {
    const cameraId = document.getElementById("cameraSelect").value;
    html5Qr = new Html5Qrcode("reader");

    html5Qr.start(
        cameraId,
        { fps: 20, qrbox: { width: 250, height: 120 } },
        (decodedText) => {

            if (scannedSet.has(decodedText)) return;

            scannedSet.add(decodedText);

            scannedData.push({
                "S.No": serial,
                "Barcode": decodedText
            });

            let row = document.getElementById("table").insertRow();
            row.insertCell(0).innerHTML = serial;
            row.insertCell(1).innerHTML = decodedText;

            serial++;
        }
    );
}

function stopScan() {
    if (html5Qr) html5Qr.stop();
}

function downloadExcel() {
    let ws = XLSX.utils.json_to_sheet(scannedData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Barcodes");
    XLSX.writeFile(wb, "Barcodes.xlsx");
}

</script>

</body>
</html>
