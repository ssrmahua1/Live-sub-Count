<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPhone Barcode Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --accent: #007AFF; /* iPhone Blue */
            --panel: #1C1C1E;
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: white;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            overflow: hidden;
        }

        /* FULL CAMERA VIEWPORT - NO CROP */
        #scanner-wrapper {
            position: relative;
            width: 100%;
            height: 45vh; /* Upper half for camera */
            background: #000;
            overflow: hidden;
            border-bottom: 2px solid #333;
        }

        #reader { width: 100% !important; height: 100% !important; }

        /* Minimal Modern Overlay */
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .focus-guide {
            width: 70%; height: 2px;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* CONTROLS AREA */
        .controls {
            padding: 15px;
            display: flex; gap: 10px;
            background: var(--panel);
            width: 100%;
        }

        button {
            flex: 1; height: 50px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer; color: white;
        }
        #start-btn { background: #32D74B; color: black; }
        #stop-btn { background: #FF453A; }
        #dl-btn { background: var(--accent); }
        button:disabled { opacity: 0.2; }

        /* DATA LIST AREA - Fit for Scrolling */
        .table-wrap {
            flex: 1;
            width: 100%;
            background: var(--bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #121212; color: #8E8E93; padding: 12px; font-size: 11px; text-align: left; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #2C2C2E; font-size: 14px; text-align: center; }
        
        .img-thumb { width: 80px; height: 45px; object-fit: cover; border-radius: 6px; background: white; border: 1px solid #333; }
        
        .status-pill {
            background: rgba(50, 215, 75, 0.1);
            color: #32D74B;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="scanner-wrapper">
        <div id="reader"></div>
        <div id="ui-overlay">
            <div class="focus-guide"></div>
            <p style="margin-top: 10px; font-size: 12px; opacity: 0.6;">Align barcode with line</p>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">START SCAN</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="dl-btn">DOWNLOAD EXCEL</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>SNo</th>
                    <th>Barcode</th>
                    <th>Photo</th>
                    <th>CODE128</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <canvas id="temp-canvas" style="display:none;"></canvas>
    <canvas id="bar-gen" style="display:none;"></canvas>

    <script>
        let scanner;
        let scanList = [];
        let isBusy = false;

        async function onScan(text, result) {
            // DUPLICATE CHECK: Ek barcode dobara scan nahi hoga
            if (isBusy || scanList.some(s => s.val === text)) return;

            isBusy = true;
            
            // 1. FULL CAMERA CAPTURE (NO CROP)
            const video = document.querySelector('video');
            const canvas = document.getElementById('temp-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const photo = canvas.toDataURL('image/jpeg', 0.6);

            // 2. JSBARCODE (CODE128)
            const genCvs = document.getElementById('bar-gen');
            try {
                JsBarcode(genCvs, text, { format: "CODE128", width: 3, height: 60, displayValue: true });
            } catch(e) {}
            const barcodeImg = genCvs.toDataURL('image/png');

            // 3. LOG DATA
            const entry = { sno: scanList.length + 1, val: text, photo: photo, bar: barcodeImg };
            scanList.push(entry);

            // 4. UI UPDATE
            const row = `<tr>
                <td>${entry.sno}</td>
                <td><span class="status-pill">${entry.val}</span></td>
                <td><img src="${photo}" class="img-thumb"></td>
                <td><img src="${barcodeImg}" class="img-thumb"></td>
            </tr>`;
            document.getElementById('log-body').insertAdjacentHTML('afterbegin', row);

            // Cooldown 1 sec for fast scanning
            setTimeout(() => { isBusy = false; }, 1000);
        }

        async function start() {
            scanner = new Html5Qrcode("reader");
            const config = { 
                fps: 30, 
                qrbox: (w, h) => { return { width: w * 0.8, height: h * 0.4 } }, // Logic area stays in center
                aspectRatio: 1.77777778 // 16:9 for iPhone
            };
            await scanner.start({ facingMode: "environment" }, config, onScan);
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        }

        async function stop() {
            if (scanner) {
                await scanner.stop();
                document.getElementById('start-btn').disabled = false;
                document.getElementById('stop-btn').disabled = true;
            }
        }

        async function exportExcel() {
            if (!scanList.length) return;
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('ScannedData');
            ws.columns = [
                { header: 'SNo', key: 'sno', width: 8 },
                { header: 'Value', key: 'val', width: 25 },
                { header: 'Capture', key: 'photo', width: 25 },
                { header: 'BarcodeGen', key: 'bar', width: 25 }
            ];

            for (const s of scanList) {
                const row = ws.addRow({ sno: s.sno, val: s.val });
                row.height = 80;
                const pId = wb.addImage({ base64: s.photo, extension: 'jpeg' });
                const bId = wb.addImage({ base64: s.bar, extension: 'png' });
                ws.addImage(pId, { tl: { col: 2, row: row.number-1 }, ext: { width: 160, height: 80 } });
                ws.addImage(bId, { tl: { col: 3, row: row.number-1 }, ext: { width: 160, height: 80 } });
            }
            const buf = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buf]), "iPhone_Scans.xlsx");
        }

        document.getElementById('start-btn').onclick = start;
        document.getElementById('stop-btn').onclick = stop;
        document.getElementById('dl-btn').onclick = exportExcel;
    </script>
</body>
</html>
