<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Custom Frame Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        :root { --blue: #007AFF; --green: #32D74B; --red: #FF453A; }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Camera Area */
        #scanner-container { position: relative; width: 100%; height: 50vh; background: #000; border-bottom: 2px solid #333; touch-action: none; }
        #reader { width: 100% !important; height: 100% !important; }

        /* Adjustable Box UI */
        #custom-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.6); }
        
        #resizable-box {
            position: absolute; border: 2px solid var(--blue); z-index: 11;
            top: 100px; left: 50px; width: 250px; height: 100px; /* Default Size */
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.6); /* High-tech masking */
            display: flex; align-items: center; justify-content: center;
        }

        #red-line { width: 100%; height: 2px; background: var(--red); box-shadow: 0 0 10px var(--red); }

        /* Draggable Corners */
        .corner {
            position: absolute; width: 30px; height: 30px; background: var(--blue);
            border-radius: 50%; border: 3px solid white; z-index: 15; pointer-events: auto;
        }
        #tl { top: -15px; left: -15px; cursor: nw-resize; }
        #tr { top: -15px; right: -15px; cursor: ne-resize; }
        #bl { bottom: -15px; left: -15px; cursor: sw-resize; }
        #br { bottom: -15px; right: -15px; cursor: se-resize; }

        /* UI Controls */
        .controls { display: flex; gap: 10px; padding: 10px; background: #1c1c1e; z-index: 20; }
        button { flex: 1; height: 45px; border: none; border-radius: 10px; font-weight: bold; color: #fff; }
        #start-btn { background: var(--green); color: #000; }
        #stop-btn { background: var(--red); }
        #xl-btn { background: var(--blue); }

        /* Result List */
        .list-area { flex: 1; overflow-y: auto; background: #000; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #121212; padding: 10px; color: #888; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #222; text-align: center; }
        .thumb { width: 80px; height: 40px; object-fit: cover; border-radius: 4px; background: #fff; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <div id="reader"></div>
        
        <div id="resizable-box">
            <div id="red-line"></div>
            <div class="corner" id="tl"></div>
            <div class="corner" id="tr"></div>
            <div class="corner" id="bl"></div>
            <div class="corner" id="br"></div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">START</button>
        <button id="stop-btn" disabled>STOP</button>
        <button id="xl-btn">EXCEL</button>
    </div>

    <div class="list-area">
        <table>
            <thead>
                <tr>
                    <th>SNo</th>
                    <th>Value</th>
                    <th>Cropped Photo</th>
                    <th>CODE128</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <canvas id="crop-cvs" style="display:none;"></canvas>
    <canvas id="bar-cvs" style="display:none;"></canvas>

    <script>
        let scanner;
        let scans = [];
        let isLocked = false;
        const box = document.getElementById('resizable-box');

        // --- CORNER DRAGGING LOGIC ---
        let currentCorner = null;
        document.querySelectorAll('.corner').forEach(corner => {
            corner.addEventListener('touchstart', (e) => { currentCorner = e.target.id; e.stopPropagation(); });
        });

        document.addEventListener('touchmove', (e) => {
            if (!currentCorner) return;
            const touch = e.touches[0];
            const container = document.getElementById('scanner-container').getBoundingClientRect();
            const x = touch.clientX - container.left;
            const y = touch.clientY - container.top;

            let rect = box.getBoundingClientRect();
            let parentRect = document.getElementById('scanner-container').getBoundingClientRect();

            if (currentCorner === 'br') {
                box.style.width = (x - (rect.left - parentRect.left)) + 'px';
                box.style.height = (y - (rect.top - parentRect.top)) + 'px';
            } else if (currentCorner === 'tl') {
                const newWidth = rect.right - parentRect.left - x;
                const newHeight = rect.bottom - parentRect.top - y;
                box.style.left = x + 'px'; box.style.top = y + 'px';
                box.style.width = newWidth + 'px'; box.style.height = newHeight + 'px';
            }
            // Logic for other corners can be added similarly, but TL and BR are enough for resizing.
        });

        document.addEventListener('touchend', () => { currentCorner = null; });

        // --- SCANNING & CROPPING ---
        async function onScan(text) {
            if (isLocked || scans.some(s => s.val === text)) return;
            isLocked = true;

            const video = document.querySelector('video');
            const canvas = document.getElementById('crop-cvs');
            const ctx = canvas.getContext('2d');

            // Map UI Box to Video Resolution
            const vW = video.videoWidth; const vH = video.videoHeight;
            const uiW = document.getElementById('scanner-container').clientWidth;
            const uiH = document.getElementById('scanner-container').clientHeight;
            
            const rect = box.getBoundingClientRect();
            const parentRect = document.getElementById('scanner-container').getBoundingClientRect();

            const scaleX = vW / uiW; const scaleY = vH / uiH;
            const cropX = (rect.left - parentRect.left) * scaleX;
            const cropY = (rect.top - parentRect.top) * scaleY;
            const cropW = rect.width * scaleX;
            const cropH = rect.height * scaleY;

            canvas.width = cropW; canvas.height = cropH;
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
            const photo = canvas.toDataURL('image/jpeg', 0.8);

            // Barcode Gen
            const barCvs = document.getElementById('bar-cvs');
            JsBarcode(barCvs, text, { format: "CODE128", width: 4, height: 60, displayValue: true });
            const barImg = barCvs.toDataURL('image/png');

            const entry = { sno: scans.length + 1, val: text, photo: photo, bar: barImg };
            scans.push(entry);

            const row = `<tr>
                <td>${entry.sno}</td>
                <td style="font-weight:bold">${entry.val}</td>
                <td><img src="${photo}" class="thumb"></td>
                <td><img src="${barImg}" class="thumb"></td>
            </tr>`;
            document.getElementById('log-body').insertAdjacentHTML('afterbegin', row);

            setTimeout(() => { isLocked = false; }, 1500);
        }

        async function start() {
            scanner = new Html5Qrcode("reader");
            // Set dynamic qrbox based on adjustable frame
            const config = { 
                fps: 25, 
                qrbox: (w, h) => {
                    const rect = box.getBoundingClientRect();
                    return { width: rect.width * 0.8, height: rect.height * 0.8 };
                }
            };
            await scanner.start({ facingMode: "environment" }, config, onScan);
            document.getElementById('start-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
        }

        async function stop() { await scanner.stop(); document.getElementById('start-btn').disabled = false; document.getElementById('stop-btn').disabled = true; }

        async function exportXL() {
            const wb = new ExcelJS.Workbook(); const ws = wb.addWorksheet('Scans');
            ws.columns = [{header:'SNo',key:'sno'},{header:'Value',key:'val'},{header:'Photo',key:'p'},{header:'Bar',key:'b'}];
            for (const s of scans) {
                const row = ws.addRow({sno:s.sno, val:s.val}); row.height = 80;
                ws.addImage(wb.addImage({base64:s.photo, extension:'jpeg'}), {tl:{col:2,row:row.number-1}, ext:{width:150,height:70}});
                ws.addImage(wb.addImage({base64:s.bar, extension:'png'}), {tl:{col:3,row:row.number-1}, ext:{width:150,height:70}});
            }
            saveAs(new Blob([await wb.xlsx.writeBuffer()]), "Adjustable_Scan.xlsx");
        }

        document.getElementById('start-btn').onclick = start;
        document.getElementById('stop-btn').onclick = stop;
        document.getElementById('xl-btn').onclick = exportXL;
    </script>
</body>
</html>
